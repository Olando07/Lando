name: Deploy to GitHub Pages

on:
    push:
        branches:
            - main
            - development

permissions:
    contents: read
    pages: write
    id-token: write

concurrency:
    group: "pages"
    cancel-in-progress: false

jobs:
    deploy:
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest

            # If you add a package.json later, you can uncomment these lines:
            # - name: Install Dependencies
            #   run: bun install
            #
            # - name: Build Project
            #   run: bun run build

            - name: Setup Pages
              uses: actions/configure-pages@v5

            - name: Upload artifact
              uses: actions/upload-pages-artifact@v3
              with:
                  # Upload entire repository
                  path: "."

            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v4
